agents:
  codex:
    label: Codex
    roles:
      - implementation
      - tests
      - fixes
      - shell_glue
    command: codex
    args: exec --skip-git-repo-check --dangerously-bypass-approvals-and-sandbox -C {project_root}
    prompt_mode: arg
    cwd: project_root
    default_timeout_seconds: 3600
  claude:
    label: Claude
    roles:
      - design
      - ux
      - architecture
      - research
    command: claude
    args: -p --permission-mode bypassPermissions --output-format text
    prompt_mode: arg
    cwd: project_root
    default_timeout_seconds: 3600
